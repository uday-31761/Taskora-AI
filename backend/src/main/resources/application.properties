spring.application.name=taskmanager

# =========================
# DATABASE (Supabase PostgreSQL)
# =========================
spring.datasource.url=jdbc:postgresql://db.bfcsgywgzxszzqdmrwmf.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=etharaaitaskmanager
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# HIKARI CONNECTION POOL
# =========================
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.initializationFailTimeout=0
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================
# JWT CONFIG
# =========================
jwt.secret=4f6d8a2b5c7e91f34a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0a2b4c6d8e0f
jwt.expiration=86400000

# =========================
# SERVER CONFIG (RENDER)
# =========================
server.port=${PORT:8080}

# =========================
# LOGGING
# =========================
logging.level.org.springframework.security=DEBUG
